<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maukah Kamu Jadi Pacarku?</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="card">
        <div class="emoji">💖</div>
        <h1>Maukah Kamu Jadi Pacarku?</h1>
        <p>
            Aku cuma mau bilang... dari semua hal manis di dunia,
            senyummu tetap favoritku. Jadi, gimana? 😊
        </p>

        <div class="buttons" id="buttonArea">
            <button id="yesBtn" type="button">Yes 💘</button>
            <button id="noBtn" type="button">No 🙈</button>
        </div>

        <div class="message" id="message"></div>
        <div class="note">Coba klik tombolnya ya 😆</div>
    </div>

    <div class="success-screen" id="successScreen">
        <div class="success-box">
            <h2>Yeaay! 💞</h2>
            <p id="successText">
                Makasih ya udah pilih Yes. Semoga ini jadi awal cerita manis kita ✨
            </p>
            <button id="closeSuccess" type="button">Tutup</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
